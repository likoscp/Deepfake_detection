<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>СЫР!</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f0f2f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

h2 { color: #333; }

.video-container {
    position: relative;
    width: 400px;
    height: 300px;
    margin-bottom: 10px;
}

#preview {
    width: 100%;
    height: 100%;
    background: #000;
    border-radius: 8px;
}

#oval-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 60%;
    height: 75%;
    transform: translate(-50%, -50%);
    border: 2px solid rgba(255, 255, 255, 0.8);
    border-radius: 50%;
    pointer-events: none;
}

.controls { margin-top: 8px; }

button {
    margin: 10px 5px;
    padding: 8px 16px;
    border: none;
    background: #007bff;
    color: #fff;
    border-radius: 5px;
    cursor: pointer;
}
button:hover { background: #0056b3; }

#progress-container {
    width: 400px;
    background: #ddd;
    border-radius: 5px;
    overflow: hidden;
    margin-top: 10px;
    height: 20px;
    margin-bottom: 10px;
}
#progress-bar {
    width: 0%;
    height: 100%;
    background: #007bff;
    transition: width 0.2s;
}

pre {
    background: #1e1e1e;
    color: #d4d4d4;
    padding: 10px;
    width: 400px;
    overflow: auto;
    border-radius: 5px;
    font-family: 'Courier New', monospace;
    transition: opacity 0.3s;
}

.auth-box {
    width: 400px;
    background: #fff;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.auth-row {
    display: flex;
    gap: 8px;
    margin: 8px 0;
}
.auth-row input {
    flex: 1;
    padding: 8px 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
}
.small-note {
    font-size: 12px;
    color: #666;
    margin-top: 4px;
}
</style>
</head>
<body>

<h2>For registration / to get access: enter email, get a code, send video</h2>


<div class="video-container">
    <video id="preview" autoplay muted playsinline></video>

    <div id="oval-overlay"></div>
</div>

<div class="controls">
    <button onclick="startRecording()">Start</button>
    <button onclick="stopRecording()">Stop</button>
</div>

<div id="progress-container">
    <div id="progress-bar"></div>
</div>

<div class="auth-box">
  <div class="auth-row">
    <input id="email" type="email" placeholder="Email" autocomplete="email">
    <button onclick="requestCode()">Send code</button>
  </div>
  <div class="auth-row">
    <input id="code" type="text" placeholder="6-digit code" inputmode="numeric" maxlength="6">
    <button onclick="sendVideo()">Send video</button>
  </div>
</div>

<pre><code id="result"></code></pre>
<button onclick="copyJSON()">Copy JSON</button>

<script>
let mediaRecorder;
let recordedChunks = [];
let stream;
let isProcessing = false;
let progressInterval;

const API_BASE = "https://karmen-vigoroso-candy.ngrok-free.dev";

async function startRecording() {
    document.getElementById("result").textContent = "";
    updateProgress(0);
    clearInterval(progressInterval);
    isProcessing = false;

    stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    document.getElementById("preview").srcObject = stream;

    recordedChunks = [];
    mediaRecorder = new MediaRecorder(stream, { mimeType: "video/webm" });

    mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) recordedChunks.push(e.data);
    };

    mediaRecorder.start();
}

function stopRecording() {
    if (!mediaRecorder) return;
    mediaRecorder.stop();
    if (stream) stream.getTracks().forEach(track => track.stop());
}

async function requestCode() {
    const email = document.getElementById("email").value.trim();
    const resultEl = document.getElementById("result");
    resultEl.textContent = "";

    if (!email) return alert("Enter email first!");

    const fd = new FormData();
    fd.append("email", email);

    try {
        const res = await fetch(`${API_BASE}/request-access`, {
            method: "POST",
            body: fd
        });
        if (!res.ok) {
            const txt = await res.text();
            throw new Error(`Server returned ${res.status}: ${txt}`);
        }
        resultEl.textContent = "Code sent to email. Check inbox/spam.";
    } catch (err) {
        resultEl.textContent = "Error: " + err.message;
        alert(err.message);
    }
}

async function sendVideo() {
    const email = document.getElementById("email").value.trim();
    const code = document.getElementById("code").value.trim();

    if (!email) return alert("Enter email first!");
    if (!code || code.length < 4) return alert("Enter the code from email!");

    if (recordedChunks.length === 0) {
        alert("No video recorded!");
        return;
    }

    const blob = new Blob(recordedChunks, { type: "video/webm" });
    const formData = new FormData();
    formData.append("email", email);
    formData.append("code", code);
    formData.append("file", blob, "recorded.webm");

    isProcessing = true;
    const resultEl = document.getElementById("result");
    resultEl.textContent = "";

    let progress = 0;
    updateProgress(0);
    clearInterval(progressInterval);
    progressInterval = setInterval(() => {
        progress = Math.min(progress + Math.random() * 5, 70);
        updateProgress(progress);
    }, 300);

    try {
        const res = await fetch(`${API_BASE}/verify-video`, {
            method: "POST",
            body: formData
        });

        if (!res.ok) {
            const txt = await res.text();
            throw new Error(`Server returned ${res.status}: ${txt}`);
        }

        const json = await res.json();
        isProcessing = false;
        clearInterval(progressInterval);
        updateProgress(100);
        resultEl.textContent = JSON.stringify(json, null, 2);
    } catch (err) {
        isProcessing = false;
        clearInterval(progressInterval);
        updateProgress(0);
        resultEl.textContent = "Error: " + err.message;
    }
}

function updateProgress(percent) {
    document.getElementById("progress-bar").style.width = percent + "%";
}

function copyJSON() {
    const text = document.getElementById("result").textContent;
    if (!text || isProcessing) return alert("Nothing to copy or still processing!");
    navigator.clipboard.writeText(text);
    alert("JSON copied!");
}
</script>

</body>
</html>
